<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Control — A.A.B.N</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            verde: {
              50:  '#f0f9f3', 100: '#d9f0e1', 200: '#b2e0c3', 300: '#7cc99a',
              400: '#46ad6f', 500: '#28904f', 600: '#1c743e', 700: '#195e34',
              800: '#174b2b', 900: '#133d23',
            }
          },
          fontFamily: {
            sans:   ['Rag', 'Segoe UI', 'Arial', 'sans-serif'],
            rag:    ['Rag', 'Arial', 'sans-serif'],
            expose: ['Expose', 'Arial Black', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @font-face{font-family:"Expose";src:url("fonts/Expose-Black.woff2") format("woff2");font-weight:900;font-display:swap;}
    @font-face{font-family:"Expose";src:url("fonts/Expose-Bold.woff2") format("woff2");font-weight:700;font-display:swap;}
    @font-face{font-family:"Expose";src:url("fonts/Expose-Regular.woff2") format("woff2");font-weight:400;font-display:swap;}
    @font-face{font-family:"Rag";src:url("fonts/Rag-Regular.woff2") format("woff2"),url("fonts/Rag-Regular.woff") format("woff");font-weight:400;font-style:normal;font-display:swap;}
    @font-face{font-family:"Rag";src:url("fonts/Rag-Bold.woff2") format("woff2"),url("fonts/Rag-Bold.woff") format("woff");font-weight:700;font-style:normal;font-display:swap;}
    @font-face{font-family:"Rag";src:url("fonts/Rag-Black.woff2") format("woff2"),url("fonts/Rag-Black.woff") format("woff");font-weight:900;font-style:normal;font-display:swap;}
    *{box-sizing:border-box;margin:0;padding:0;}

    .hero-bg {
      background: linear-gradient(135deg, #133d23 0%, #195e34 55%, #1c743e 100%);
      min-height: 100vh;
    }

    .selector-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(12px);
      transition: transform .2s, background .2s, box-shadow .2s;
      cursor: pointer;
    }
    .selector-card:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-5px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }

    .card-icon-wrap {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .shield-glow {
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.2));
    }

    .arrow-icon {
      opacity: 0.5;
      transition: opacity .2s, transform .2s;
    }
    .selector-card:hover .arrow-icon {
      opacity: 1;
      transform: translateX(4px);
    }
  </style>
</head>
<body class="hero-bg font-sans antialiased">

<!-- AUTH CHECK -->
<script>
  const admin = JSON.parse(sessionStorage.getItem('admin') || 'null');
  if (!admin) window.location.href = 'login.html';
</script>

<!-- NAV -->
<header class="sticky top-0 z-50 border-b border-white/10 bg-verde-900/60 backdrop-blur-md">
  <div class="max-w-screen-lg mx-auto px-5 h-14 flex items-center justify-between gap-4">
    <a href="index.html" class="flex items-center gap-3 shrink-0">
      <img src="images.jpeg" alt="AABN" class="h-8 w-auto rounded-md shield-glow">
      <span class="text-white font-expose font-black text-sm tracking-widest uppercase hidden sm:block">A.A.B.N</span>
    </a>
    <div class="flex items-center gap-2.5">
      <div id="admin-info" class="hidden sm:flex items-center gap-2 bg-verde-800/80 border border-verde-700 rounded-full px-3.5 py-1.5">
        <svg class="w-3.5 h-3.5 text-green-300 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
        </svg>
        <span id="admin-nombre" class="text-white text-xs font-semibold"></span>
        <span class="text-verde-400 text-xs">·</span>
        <span id="admin-rol" class="text-verde-300 text-xs"></span>
      </div>
      <button onclick="cerrarSesion()"
        class="text-verde-300 hover:text-white text-xs border border-verde-700 hover:border-verde-400 rounded-full px-3.5 py-1.5 hover:bg-verde-800 transition-all">
        Cerrar sesión
      </button>
    </div>
  </div>
</header>

<!-- CONTENIDO PRINCIPAL -->
<main class="max-w-screen-lg mx-auto px-5 py-16 sm:py-24">

  <!-- Encabezado -->
  <div class="text-center mb-14">
    <div class="inline-flex items-center gap-2 bg-white/10 text-green-200 text-xs font-bold px-4 py-1.5 rounded-full mb-5 tracking-widest uppercase">
      Panel de Control
    </div>
    <h1 class="font-expose font-black text-white text-4xl sm:text-5xl tracking-tight mb-3">
      ¿QUÉ QUERÉS VER?
    </h1>
    <p id="bienvenida" class="text-green-200 text-base max-w-sm mx-auto">
      Seleccioná un módulo para continuar.
    </p>
  </div>

  <!-- Tarjetas -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl mx-auto">

    <!-- Tarjeta Socios -->
    <a href="panel-admin.html" class="selector-card rounded-3xl p-8 flex flex-col gap-6 no-underline">
      <div class="card-icon-wrap">🏟️</div>
      <div class="flex-1">
        <h2 class="font-expose font-black text-white text-2xl tracking-tight mb-2">Dashboard Socios</h2>
        <p class="text-green-200/80 text-sm leading-relaxed">
          Padrón completo, estado de deuda, disciplinas y filtros por categoría.
        </p>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-green-300 text-xs font-semibold uppercase tracking-widest">Ver módulo</span>
        <svg class="arrow-icon w-5 h-5 text-green-300" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
        </svg>
      </div>
    </a>

    <!-- Tarjeta Financiero -->
    <a href="dashboard-financiero.html" class="selector-card rounded-3xl p-8 flex flex-col gap-6 no-underline">
      <div class="card-icon-wrap">💰</div>
      <div class="flex-1">
        <h2 class="font-expose font-black text-white text-2xl tracking-tight mb-2">Dashboard Financiero</h2>
        <p class="text-green-200/80 text-sm leading-relaxed">
          Posición financiera 2026, ingresos, egresos y balance mensual del club.
        </p>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-green-300 text-xs font-semibold uppercase tracking-widest">Ver módulo</span>
        <svg class="arrow-icon w-5 h-5 text-green-300" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
        </svg>
      </div>
    </a>

  </div>
</main>

<script>
  const a = JSON.parse(sessionStorage.getItem('admin') || 'null');
  if (a) {
    document.getElementById('admin-nombre').textContent = a.nombre;
    document.getElementById('admin-rol').textContent    = a.rol;
    document.getElementById('admin-info').classList.remove('hidden');
    document.getElementById('bienvenida').textContent   = `Bienvenido, ${a.nombre.split(' ')[0]}.`;
  }

  function cerrarSesion() {
    sessionStorage.removeItem('admin');
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
